services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: langlearn
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      target: deps
    command: sh -c "node scripts/migrate.mjs && npm run dev"
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://postgres:secret@db:5432/langlearn
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
